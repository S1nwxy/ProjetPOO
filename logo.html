<!DOCTYPE html>
<html >
<body >
<h2 >logo.html</h2>
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" >
<rect width="400" height="400" x="0" y="0" style="fill:none;stroke-width:1;stroke:gray" />
<line x1="208" y1="200" x2="193.072" y2="204" style="fill:none;stroke:red;stroke-width:1" />
<line x1="193.072" y1="204" x2="193.072" y2="196" style="fill:none;stroke:red;stroke-width:1" />
<line x1="208" y1="200" x2="193.072" y2="196" style="fill:none;stroke:red;stroke-width:1" />
</svg>
<script >
// Function to reload the page
function reloadPage() {
  // Fetch the new page content asynchronously
  fetch(window.location.href)
    .then(response => response.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newContent = doc.querySelector('body').innerHTML;
      document.querySelector('body').innerHTML = newContent;
    })
    .catch(error => {
      console.error('Error reloading page:', error);
    });
}

// Reload the page every 1 second
setInterval(reloadPage, 1000);
</script>
</body>
</html>
