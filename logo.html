<!DOCTYPE html>
<html >
<body >
<h2 >logo.html</h2>
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" >
<rect width="400" height="400" x="0" y="0" style="fill:none;stroke-width:1;stroke:gray" />
<line x1="200" y1="-10" x2="200" y2="-110" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="-110" x2="200" y2="-210" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="200" x2="200" y2="100" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="100" x2="200" y2="0" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="200" x2="200" y2="100" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="100" x2="200" y2="0" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="0" x2="200" y2="-100" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="200" x2="200" y2="100" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="100" x2="200" y2="0" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="0" x2="200" y2="-10" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="-10" x2="200" y2="-110" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="200" x2="200" y2="100" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="100" x2="200" y2="0" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="0" x2="200" y2="-10" style="fill:none;stroke:navy;stroke-width:3" />
<line x1="200" y1="200" x2="300" y2="200" style="fill:none;stroke:navy;stroke-width:3" />
</svg>
<script >
// Function to reload the page
function reloadPage() {
  // Fetch the new page content asynchronously
  fetch(window.location.href)
    .then(response => response.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newContent = doc.querySelector('body').innerHTML;
      document.querySelector('body').innerHTML = newContent;
    })
    .catch(error => {
      console.error('Error reloading page:', error);
    });
}

// Reload the page every 1 second
setInterval(reloadPage, 1000);
</script>
</body>
</html>
