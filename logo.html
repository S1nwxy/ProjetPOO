<!DOCTYPE html>
<html >
<body >
<h2 >logo.html</h2>
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg" >
<rect width="400" height="400" x="0" y="0" style="fill:none;stroke-width:1;stroke:gray" />
<line x1="200" y1="200" x2="250" y2="200" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="250" y1="200" x2="285" y2="235" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="285" y1="235" x2="285" y2="285" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="285" y1="285" x2="249" y2="320" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="249" y1="320" x2="199" y2="320" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="199" y1="320" x2="163" y2="284" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="163" y1="284" x2="163" y2="234" style="fill:none;stroke:navy;stroke-width:2" />
<line x1="163" y1="234" x2="198" y2="198" style="fill:none;stroke:navy;stroke-width:2" />

<line x1="206" y1="198" x2="191.072" y2="194" style="fill:none;stroke:red;stroke-width:1" />
</svg>
<script >
// Function to reload the page
function reloadPage() {
  // Fetch the new page content asynchronously
  fetch(window.location.href)
    .then(response => response.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newContent = doc.querySelector('body').innerHTML;
      document.querySelector('body').innerHTML = newContent;
    })
    .catch(error => {
      console.error('Error reloading page:', error);
    });
}

// Reload the page every 1 second
setInterval(reloadPage, 1000);
</script>
</body>
</html>
